<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Critterpédia ACNH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ==============================
       Base visuelle Animal Crossing
       ============================== */
    :root {
      --cream: #FFF8EE;
      --paper: #FFFFFF;
      --paper-soft: #FFFDF7;
      --mint: #73C4A0;
      --mint-strong: #21835F;
      --leaf: #2F6F54;
      --sky: #A8D8EA;
      --water: #4D9FBE;
      --yellow: #F6E27F;
      --sand: #F9DFAE;
      --coral: #F08D7E;
      --red: #B94747;
      --green: #247A50;
      --ink: #243D36;
      --muted: #63766F;
      --line: rgba(36, 61, 54, 0.14);
      --shadow: 0 14px 32px rgba(45, 73, 64, 0.16);
      --shadow-soft: 0 8px 20px rgba(45, 73, 64, 0.10);
      --radius: 16px;
      --topbar-height: 84px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.45;
      background:
        linear-gradient(135deg, rgba(168, 216, 234, 0.44) 0 24%, transparent 24% 100%),
        linear-gradient(180deg, #FFF7E9 0%, #FFFDF7 54%, #EAF8F2 100%);
      background-attachment: fixed;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .page {
      width: min(1280px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 44px;
    }

    .skip-link {
      position: absolute;
      left: 14px;
      top: 10px;
      z-index: 40;
      transform: translateY(-150%);
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      background: var(--ink);
      text-decoration: none;
      transition: transform 180ms ease;
    }

    .skip-link:focus { transform: translateY(0); }

    /* ==============================
       Header : objectif clair + progression
       ============================== */
    .hero {
      display: grid;
      gap: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
    }

    .hero-main {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .app-title {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.6rem);
      line-height: 1.05;
      font-weight: 900;
    }

    .hero-subtitle {
      margin: 0;
      color: var(--muted);
      font-weight: 800;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper-soft);
    }

    .summary-card strong {
      display: block;
      font-size: clamp(1.15rem, 4vw, 1.6rem);
      font-weight: 900;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }

    .summary-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
    }

    .progress-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
    }

    .progress-head span:last-child {
      color: var(--mint-strong);
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      overflow: hidden;
      height: 14px;
      border-radius: 999px;
      background: rgba(36, 61, 54, 0.10);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), var(--yellow), var(--sky));
      transition: width 280ms ease;
    }

    /* ==============================
       Barre d'actions claire et stable
       ============================== */
    .control-panel {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      gap: 12px;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 253, 247, 0.94);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .tab-button {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--ink);
      background: #fff;
      box-shadow: 0 4px 12px rgba(45, 73, 64, 0.06);
      text-align: left;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .tab-button:hover { transform: translateY(-1px); }

    .tab-button[aria-selected="true"] {
      border-color: rgba(33, 131, 95, 0.48);
      background: linear-gradient(135deg, #DDF6E8, #EAF6FB);
    }

    .tab-icon {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: var(--yellow);
      color: #4E4A23;
    }

    .tab-button b {
      display: block;
      font-weight: 900;
    }

    .tab-button small {
      display: block;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.78rem;
    }

    .tab-count {
      color: var(--leaf);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .filters {
      display: grid;
      gap: 10px;
    }

    .field, .segment {
      display: grid;
      gap: 7px;
      min-width: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .field label, .segment legend {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .search-field {
      position: relative;
    }

    .search-field input {
      width: 100%;
      min-height: 50px;
      padding: 0 14px 0 44px;
      border: 1px solid var(--line);
      border-radius: 15px;
      color: var(--ink);
      background: #fff;
      outline: none;
      font-weight: 800;
    }

    .search-field svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .segment-options, .switch-row {
      display: grid;
      gap: 8px;
    }

    .segment-options { grid-template-columns: 1fr 1fr; }

    .segment label, .switch, .reset-button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 4px 12px rgba(45, 73, 64, 0.06);
    }

    .segment label, .switch {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      font-weight: 900;
    }

    .segment input, .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segment input:checked + span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 34px;
      border-radius: 10px;
      color: #304128;
      background: var(--yellow);
    }

    .switch .switch-box {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(36, 61, 54, 0.24);
      border-radius: 8px;
      color: white;
      background: white;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .switch input:checked + .switch-box {
      border-color: var(--mint-strong);
      background: var(--mint-strong);
    }

    .switch input:checked + .switch-box::after {
      content: "✓";
      font-weight: 900;
      line-height: 1;
    }

    .reset-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      color: #9D3D35;
      font-weight: 900;
    }

    .search-field input:focus,
    .month-field input:focus,
    .tab-button:focus-visible,
    .segment input:focus-visible + span,
    .switch input:focus-visible + .switch-box,
    .reset-button:focus-visible,
    .capture-input:focus-visible + span {
      outline: 3px solid rgba(246, 226, 127, 0.88);
      outline-offset: 2px;
    }

    /* ==============================
       Timeline de chasse
       ============================== */
    .timeline-panel {
      display: grid;
      gap: 14px;
      margin-top: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow-soft);
    }

    .timeline-header {
      display: grid;
      gap: 10px;
    }

    .timeline-header h2 {
      margin: 0;
      font-size: clamp(1.18rem, 2.5vw, 1.55rem);
      line-height: 1.12;
      font-weight: 900;
    }

    .timeline-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-weight: 800;
    }

    .timeline-summary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 9px 12px;
      border-radius: 999px;
      color: var(--leaf);
      background: #E4F7EC;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .timeline-controls {
      display: grid;
      gap: 10px;
    }

    .month-field input {
      width: 100%;
      min-height: 48px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 15px;
      color: var(--ink);
      background: #fff;
      outline: none;
      font-weight: 900;
    }

    .timeline-months {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 8px;
      scrollbar-width: thin;
    }

    .month-node {
      flex: 0 0 auto;
      min-width: 118px;
      padding: 10px;
      border: 1px solid rgba(36, 61, 54, 0.12);
      border-radius: 15px;
      background: linear-gradient(180deg, #FFFFFF, #F4FBF7);
      box-shadow: 0 4px 12px rgba(45, 73, 64, 0.06);
    }

    .month-node strong {
      display: block;
      font-weight: 900;
    }

    .month-node span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 900;
    }

    .timeline-results {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .timeline-card {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper-soft);
    }

    .timeline-card img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(168, 216, 234, 0.42), rgba(249, 223, 174, 0.26));
    }

    .timeline-card-body {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .timeline-card-head {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      min-width: 0;
    }

    .timeline-card h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.15;
      font-weight: 900;
      overflow-wrap: break-word;
      word-break: normal;
      hyphens: auto;
    }

    .timeline-type {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--leaf);
      background: #E4F7EC;
      font-size: 0.76rem;
      font-weight: 900;
      justify-self: start;
    }

    .timeline-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .timeline-capture span {
      min-height: 38px;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    /* ==============================
       Liste et cartes
       ============================== */
    .list-top {
      display: grid;
      gap: 8px;
      margin: 22px 2px 14px;
    }

    .list-top h2 {
      margin: 0;
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      line-height: 1.1;
      font-weight: 900;
    }

    .list-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-weight: 900;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card {
      position: relative;
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr);
      gap: 0;
      min-width: 0;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow-soft);
      transition: transform 170ms ease, border-color 170ms ease, box-shadow 170ms ease, opacity 170ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card.available {
      border-color: rgba(36, 122, 80, 0.56);
    }

    .card.available::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: 0 0 0 0 rgba(36, 122, 80, 0.18);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .card.caught {
      opacity: 0.58;
    }

    .image-zone {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 176px;
      padding: 12px;
      background:
        linear-gradient(180deg, rgba(168, 216, 234, 0.52), rgba(255, 248, 238, 0.88));
    }

    .image-zone img {
      display: block;
      width: 96px;
      max-width: 100%;
      height: 106px;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(36, 61, 54, 0.16));
    }

    .image-missing {
      display: none;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      text-align: center;
    }

    .card-main {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
      min-width: 0;
      padding: 12px;
    }

    .card-head {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .card-title-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      min-width: 0;
    }

    .card h3 {
      min-width: 0;
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.16;
      font-weight: 900;
      overflow-wrap: break-word;
      word-break: normal;
      hyphens: auto;
    }

    .status-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 900;
      white-space: nowrap;
      justify-self: start;
    }

    .status-pill.now {
      color: var(--green);
      background: #DFF6E9;
    }

    .status-pill.later {
      color: var(--red);
      background: #FFE7E1;
    }

    .caught-ribbon {
      display: none;
      color: var(--green);
      font-weight: 900;
    }

    .card.caught .caught-ribbon { display: block; }

    .detail-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .detail-list li {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: start;
      gap: 7px;
      color: #334E46;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .detail-list svg {
      width: 19px;
      height: 19px;
      color: var(--leaf);
    }

    .months.ok { color: var(--green); }
    .months.no { color: var(--red); }

    .card-bottom {
      display: grid;
      gap: 8px;
      margin-top: auto;
    }

    .price-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      color: var(--ink);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .price-line small {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
    }

    .capture-label { display: block; }

    .capture-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .capture-label span {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid rgba(33, 131, 95, 0.35);
      border-radius: 14px;
      color: var(--leaf);
      background: #F2FBF6;
      font-weight: 900;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .capture-input:checked + span {
      border-color: var(--green);
      color: #fff;
      background: var(--green);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 24px;
      border: 2px dashed rgba(36, 61, 54, 0.18);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255,255,255,0.74);
      font-weight: 900;
      text-align: center;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(36, 122, 80, 0.18); }
      50% { box-shadow: 0 0 0 7px rgba(36, 122, 80, 0.07); }
    }

    /* ==============================
       SVG symboles inline
       ============================== */
    .icon-sprite { display: none; }

    /* ==============================
       Responsive
       ============================== */
    @media (min-width: 680px) {
      .hero {
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        align-items: center;
        padding: 22px;
      }

      .tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }

      .filters {
        grid-template-columns: minmax(260px, 1.35fr) 210px;
        align-items: end;
      }

      .switch-row { grid-template-columns: 1fr 1fr; }

      .timeline-header {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }

      .timeline-controls {
        grid-template-columns: repeat(2, minmax(190px, 1fr));
      }

      .timeline-results { grid-template-columns: repeat(2, minmax(0, 1fr)); }

      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (min-width: 860px) and (max-width: 1039px) {
      .page { width: min(100% - 40px, 1280px); }

      .card {
        grid-template-columns: 124px minmax(0, 1fr);
      }

      .image-zone img {
        width: 106px;
        height: 116px;
      }
    }

    @media (min-width: 1040px) {
      .page { width: min(100% - 48px, 1680px); }

      .control-panel {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }

      .filters {
        grid-template-columns: minmax(300px, 1.4fr) 210px minmax(300px, 1.1fr) auto;
      }

      .timeline-panel {
        padding: 18px;
      }

      .timeline-results { grid-template-columns: repeat(3, minmax(0, 1fr)); }

      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .card { grid-template-columns: 132px minmax(0, 1fr); }
      .image-zone img { width: 112px; height: 122px; }
    }

    @media (min-width: 1240px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .card { grid-template-columns: 124px minmax(0, 1fr); }
      .image-zone { min-height: 176px; }
      .image-zone img { width: 108px; height: 122px; }
      .card-main { padding: 14px; }
    }

    @media (min-width: 1500px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .timeline-results { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 420px) {
      .page { width: min(100% - 18px, 1280px); }
      .summary-grid { grid-template-columns: 1fr; }
      .card { grid-template-columns: 100px minmax(0, 1fr); }
      .image-zone { min-height: 154px; }
      .image-zone img { width: 84px; height: 96px; }
      .status-pill { white-space: normal; }
      .timeline-card { grid-template-columns: 60px minmax(0, 1fr); }
      .timeline-card img { width: 60px; height: 60px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#content">Aller au contenu</a>

    /* ==============================
       État et constantes
       ============================== */
    const MONTH_NAMES = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
    const TYPE_LABELS = { bugs: 'Insectes', fish: 'Poissons', sea: 'Créatures marines' };
    const TYPE_ICON = { bugs: 'i-bug', fish: 'i-fish', sea: 'i-wave' };
    const STORAGE_HEMISPHERE = 'acnh_hemisphere';
    const CURRENT_MONTH = new Date().getMonth() + 1;

    const state = {
      activeType: 'bugs',
      hemisphere: readStorage(STORAGE_HEMISPHERE) || 'nord'
    };

    const dom = {
      grid: document.getElementById('critterGrid'),
      globalCounter: document.getElementById('globalCounter'),
      progressPercent: document.getElementById('progressPercent'),
      progressFill: document.getElementById('progressFill'),
      missingTotal: document.getElementById('missingTotal'),
      availableTotal: document.getElementById('availableTotal'),
      visibleTotal: document.getElementById('visibleTotal'),
      activeHemiLabel: document.getElementById('activeHemiLabel'),
      monthLabel: document.getElementById('monthLabel'),
      sectionTitle: document.getElementById('sectionTitle'),
      listMeta: document.getElementById('listMeta'),
      timelineStart: document.getElementById('timelineStart'),
      timelineEnd: document.getElementById('timelineEnd'),
      timelineRangeLabel: document.getElementById('timelineRangeLabel'),
      timelineSummary: document.getElementById('timelineSummary'),
      timelineMonths: document.getElementById('timelineMonths'),
      timelineResults: document.getElementById('timelineResults'),
      searchInput: document.getElementById('searchInput'),
      availableOnly: document.getElementById('availableOnly'),
      missingOnly: document.getElementById('missingOnly'),
      resetButton: document.getElementById('resetButton'),
      tabs: Array.from(document.querySelectorAll('.tab-button')),
      hemisphereInputs: Array.from(document.querySelectorAll('input[name="hemisphere"]'))
    };

    /* ==============================
       Stockage local
       ============================== */
    function readStorage(key) {
      try { return localStorage.getItem(key); } catch (error) { return null; }
    }

    function writeStorage(key, value) {
      try { localStorage.setItem(key, value); } catch (error) { return false; }
      return true;
    }

    function removeStorage(key) {
      try { localStorage.removeItem(key); } catch (error) { return false; }
      return true;
    }

    function caughtKey(type, id) { return 'acnh_caught_' + type + '_' + id; }
    function isCaught(type, id) { return readStorage(caughtKey(type, id)) === 'true'; }
    function setCaught(type, id, value) { value ? writeStorage(caughtKey(type, id), 'true') : removeStorage(caughtKey(type, id)); }

    /* ==============================
       Formatage
       ============================== */
    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeSearch(value) {
      return String(value || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
    }

    function formatPrice(value) {
      return new Intl.NumberFormat('fr-FR').format(value) + ' cloche' + (value > 1 ? 's' : '');
    }

    function formatHour(hour) { return hour === 24 ? '24h' : hour + 'h'; }

    function formatHours(item) {
      if (item.touteLaJournee) return 'Toute la journée';
      return item.heures.map((range) => formatHour(range.debut) + ' → ' + formatHour(range.fin)).join(', ');
    }

    function formatMonths(months) {
      const ordered = Array.from(new Set(months)).sort((a, b) => a - b);
      if (ordered.length === 12) return "Toute l'année";
      if (!ordered.length) return 'Indisponible';
      const ranges = [];
      let start = ordered[0];
      let previous = ordered[0];
      for (let i = 1; i < ordered.length; i += 1) {
        const month = ordered[i];
        if (month === previous + 1) previous = month;
        else { ranges.push([start, previous]); start = month; previous = month; }
      }
      ranges.push([start, previous]);
      return ranges.map(([first, last]) => first === last ? MONTH_NAMES[first - 1] : MONTH_NAMES[first - 1] + ' → ' + MONTH_NAMES[last - 1]).join(', ');
    }

    function getMonths(item) { return state.hemisphere === 'sud' ? item.moisSud : item.moisNord; }
    function isAvailableNow(item) { return getMonths(item).includes(CURRENT_MONTH); }

    function icon(id, size = 19) {
      return '<svg width="' + size + '" height="' + size + '" aria-hidden="true"><use href="#' + id + '"></use></svg>';
    }

    function toMonthValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      return year + '-' + month;
    }

    function parseMonthInput(value) {
      const parts = String(value || '').split('-').map(Number);
      if (parts.length !== 2 || parts.some(Number.isNaN)) {
        const today = new Date();
        return { year: today.getFullYear(), month: today.getMonth() + 1 };
      }
      return { year: parts[0], month: Math.min(12, Math.max(1, parts[1])) };
    }

    function addMonths(date, months) {
      const copy = new Date(date);
      copy.setMonth(copy.getMonth() + months);
      return copy;
    }

    function monthIndex(monthInfo) {
      return monthInfo.year * 12 + monthInfo.month;
    }

    function formatMonthFR(monthInfo) {
      return MONTH_NAMES[monthInfo.month - 1] + ' ' + monthInfo.year;
    }

    function initTimelineDates() {
      const today = new Date();
      dom.timelineStart.value = toMonthValue(today);
      dom.timelineEnd.value = toMonthValue(addMonths(today, 1));
    }

    function timelineMonthRange() {
      let start = parseMonthInput(dom.timelineStart.value);
      let end = parseMonthInput(dom.timelineEnd.value);
      if (monthIndex(start) > monthIndex(end)) [start, end] = [end, start];
      return { start, end };
    }

    function timelineMonthsInRange() {
      const { start, end } = timelineMonthRange();
      const months = [];
      const cursor = new Date(start.year, start.month - 1, 1);
      const final = new Date(end.year, end.month - 1, 1);

      while (cursor <= final && months.length < 24) {
        months.push({
          key: cursor.getFullYear() + '-' + String(cursor.getMonth() + 1).padStart(2, '0'),
          year: cursor.getFullYear(),
          month: cursor.getMonth() + 1,
          label: MONTH_NAMES[cursor.getMonth()] + ' ' + cursor.getFullYear()
        });
        cursor.setMonth(cursor.getMonth() + 1);
      }

      return months;
    }

    /* ==============================
       Calculs de collection
       ============================== */
    function allItems() { return Object.entries(CRITTERS).flatMap(([type, items]) => items.map((item) => ({ type, item }))); }
    function totalCount() { return allItems().length; }
    function caughtCount(type) { return CRITTERS[type].filter((item) => isCaught(type, item.id)).length; }
    function missingCount(type) { return CRITTERS[type].length - caughtCount(type); }
    function currentAvailableCount(type) { return CRITTERS[type].filter(isAvailableNow).length; }

    function updateCounters(visibleCount) {
      const total = totalCount();
      const caught = Object.keys(CRITTERS).reduce((sum, type) => sum + caughtCount(type), 0);
      const missing = total - caught;
      const progress = total ? Math.round((caught / total) * 100) : 0;
      const available = CRITTERS[state.activeType].filter(isAvailableNow).length;

      dom.globalCounter.textContent = caught + ' / ' + total + ' capturées';
      dom.progressPercent.textContent = progress + '%';
      dom.progressFill.style.width = progress + '%';
      dom.missingTotal.textContent = missing;
      dom.availableTotal.textContent = available;
      dom.visibleTotal.textContent = visibleCount;
      dom.activeHemiLabel.textContent = state.hemisphere === 'sud' ? 'Sud' : 'Nord';
      dom.monthLabel.textContent = MONTH_NAMES[CURRENT_MONTH - 1] + ' · Hémisphère ' + (state.hemisphere === 'sud' ? 'Sud' : 'Nord');

      setTab('Bugs', 'bugs');
      setTab('Fish', 'fish');
      setTab('Sea', 'sea');
    }

    function setTab(suffix, type) {
      document.getElementById('tabCount' + suffix).textContent = caughtCount(type) + ' / ' + CRITTERS[type].length;
      document.getElementById('tabMeta' + suffix).textContent = missingCount(type) + ' manquante' + (missingCount(type) > 1 ? 's' : '') + ' · ' + currentAvailableCount(type) + ' ce mois-ci';
    }

    /* ==============================
       Rendu de la grille
       ============================== */
    function extraDetail(item) {
      if (state.activeType === 'fish') return '<li>' + icon('i-eye') + '<span>Ombre : ' + escapeHTML(item.ombre) + '</span></li>';
      if (state.activeType === 'sea') return '<li>' + icon('i-speed') + '<span>Vitesse : ' + escapeHTML(item.vitesse) + '</span></li>';
      return '';
    }

    function specialPriceLabel(item, type = state.activeType) {
      if (!item.prixSpecial) return '';
      const label = type === 'bugs' ? 'Jean-Pierre' : 'Pollux';
      return '<small>' + label + ' : ' + formatPrice(item.prixSpecial) + '</small>';
    }

    function timelineMatches(item, months) {
      const availableMonths = getMonths(item);
      return months.filter((monthInfo) => availableMonths.includes(monthInfo.month));
    }

    function timelineCritters() {
      const months = timelineMonthsInRange();
      const typeOrder = { bugs: 0, fish: 1, sea: 2 };

      return allItems()
        .map(({ type, item }) => ({ type, item, activeMonths: timelineMatches(item, months) }))
        .filter(({ type, item, activeMonths }) => !isCaught(type, item.id) && activeMonths.length > 0)
        .sort((a, b) => {
          const firstA = months.findIndex((monthInfo) => a.activeMonths.some((active) => active.key === monthInfo.key));
          const firstB = months.findIndex((monthInfo) => b.activeMonths.some((active) => active.key === monthInfo.key));
          return firstA - firstB || typeOrder[a.type] - typeOrder[b.type] || a.item.id - b.item.id;
        });
    }

    function renderTimelineCard(entry) {
      const monthsText = entry.activeMonths.map((monthInfo) => monthInfo.label).join(', ');
      const detailText = entry.item.lieu + ' · ' + formatHours(entry.item);

      return '<article class="timeline-card">' +
        '<img src="' + escapeHTML(entry.item.image) + '" alt="' + escapeHTML(entry.item.nom) + '" loading="lazy" width="72" height="72">' +
        '<div class="timeline-card-body">' +
          '<div class="timeline-card-head">' +
            '<h3>' + escapeHTML(entry.item.nom) + '</h3>' +
            '<span class="timeline-type">' + escapeHTML(TYPE_LABELS[entry.type]) + '</span>' +
          '</div>' +
          '<p>' + escapeHTML(monthsText) + '</p>' +
          '<p>' + escapeHTML(detailText) + '</p>' +
          '<div class="price-line"><span>' + icon('i-bell', 18) + ' ' + formatPrice(entry.item.prixBase) + '</span>' + specialPriceLabel(entry.item, entry.type) + '</div>' +
          '<label class="capture-label timeline-capture"><input class="capture-input" type="checkbox" data-type="' + entry.type + '" data-id="' + entry.item.id + '"><span>Marquer capturée</span></label>' +
        '</div>' +
      '</article>';
    }

    function attachImageFallback(root) {
      root.querySelectorAll('img').forEach((image) => {
        image.addEventListener('error', () => {
          image.style.display = 'none';
          const missing = image.parentElement ? image.parentElement.querySelector('.image-missing') : null;
          if (missing) missing.style.display = 'block';
        }, { once: true });
      });
    }

    function renderTimeline() {
      const { start, end } = timelineMonthRange();
      const months = timelineMonthsInRange();
      const entries = timelineCritters();

      dom.timelineRangeLabel.textContent = formatMonthFR(start) + ' → ' + formatMonthFR(end) + ' · Hémisphère ' + (state.hemisphere === 'sud' ? 'Sud' : 'Nord');
      dom.timelineSummary.textContent = entries.length + ' manquante' + (entries.length > 1 ? 's' : '');

      dom.timelineMonths.innerHTML = months.map((monthInfo) => {
        const count = entries.filter((entry) => entry.activeMonths.some((active) => active.key === monthInfo.key)).length;
        return '<div class="month-node"><strong>' + escapeHTML(monthInfo.label) + '</strong><span>' + count + ' à chopper</span></div>';
      }).join('');

      dom.timelineResults.innerHTML = entries.length
        ? entries.map(renderTimelineCard).join('')
        : '<div class="empty-state">Aucune manquante capturable sur cette période.</div>';

      attachImageFallback(dom.timelineResults);
    }

    function renderCard(item) {
      const caught = isCaught(state.activeType, item.id);
      const available = isAvailableNow(item);
      const months = formatMonths(getMonths(item));
      const monthClass = available ? 'ok' : 'no';
      const status = available ? '<span class="status-pill now">Disponible</span>' : '<span class="status-pill later">Pas ce mois-ci</span>';
      const checked = caught ? ' checked' : '';
      const cardClass = 'card' + (available ? ' available' : '') + (caught ? ' caught' : '');

      return '<article class="' + cardClass + '" data-id="' + item.id + '">' +
        '<div class="image-zone">' +
          '<img src="' + escapeHTML(item.image) + '" alt="' + escapeHTML(item.nom) + '" loading="lazy" width="132" height="132">' +
          '<span class="image-missing">Image manquante</span>' +
        '</div>' +
        '<div class="card-main">' +
          '<div class="card-head">' +
            '<div class="card-title-row"><h3>' + escapeHTML(item.nom) + '</h3>' + status + '</div>' +
            '<span class="caught-ribbon">✓ Capturée</span>' +
          '</div>' +
          '<ul class="detail-list">' +
            '<li>' + icon('i-pin') + '<span>' + escapeHTML(item.lieu) + '</span></li>' +
            '<li>' + icon('i-calendar') + '<span class="months ' + monthClass + '">' + escapeHTML(months) + '</span></li>' +
            '<li>' + icon('i-clock') + '<span>' + escapeHTML(formatHours(item)) + '</span></li>' +
            extraDetail(item) +
          '</ul>' +
          '<div class="card-bottom">' +
            '<div class="price-line"><span>' + icon('i-bell', 18) + ' ' + formatPrice(item.prixBase) + '</span>' + specialPriceLabel(item) + '</div>' +
            '<label class="capture-label"><input class="capture-input" type="checkbox" data-type="' + state.activeType + '" data-id="' + item.id + '"' + checked + '><span>' + (caught ? 'Capturée' : 'Marquer capturée') + '</span></label>' +
          '</div>' +
        '</div>' +
      '</article>';
    }

    function filteredItems() {
      const query = normalizeSearch(dom.searchInput.value);
      return CRITTERS[state.activeType].filter((item) => {
        const searchOk = !query || normalizeSearch(item.nom).includes(query) || normalizeSearch(item.nomEN).includes(query);
        const monthOk = !dom.availableOnly.checked || isAvailableNow(item);
        const missingOk = !dom.missingOnly.checked || !isCaught(state.activeType, item.id);
        return searchOk && monthOk && missingOk;
      });
    }

    function renderMeta(items) {
      const visible = items.length;
      const available = items.filter(isAvailableNow).length;
      const missingVisible = items.filter((item) => !isCaught(state.activeType, item.id)).length;
      dom.listMeta.innerHTML = [
        '<span class="meta-pill">' + visible + ' résultat' + (visible > 1 ? 's' : '') + '</span>',
        '<span class="meta-pill">' + available + ' disponible' + (available > 1 ? 's' : '') + ' ce mois-ci</span>',
        '<span class="meta-pill">' + missingVisible + ' à capturer</span>'
      ].join('');
    }

    function render() {
      const items = filteredItems();
      dom.sectionTitle.textContent = TYPE_LABELS[state.activeType];
      dom.tabs.forEach((tab) => tab.setAttribute('aria-selected', tab.dataset.type === state.activeType ? 'true' : 'false'));
      renderMeta(items);
      dom.grid.innerHTML = items.length ? items.map(renderCard).join('') : '<div class="empty-state">Aucune bestiole ne correspond aux filtres actuels.</div>';

      attachImageFallback(dom.grid);
      renderTimeline();
      updateCounters(items.length);
    }

    /* ==============================
       Interactions
       ============================== */
    dom.tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        state.activeType = tab.dataset.type;
        render();
      });
    });

    dom.hemisphereInputs.forEach((input) => {
      input.checked = input.value === state.hemisphere;
      input.addEventListener('change', () => {
        state.hemisphere = input.value;
        writeStorage(STORAGE_HEMISPHERE, state.hemisphere);
        render();
      });
    });

    dom.searchInput.addEventListener('input', render);
    dom.availableOnly.addEventListener('change', render);
    dom.missingOnly.addEventListener('change', render);
    dom.timelineStart.addEventListener('change', renderTimeline);
    dom.timelineEnd.addEventListener('change', renderTimeline);

    dom.grid.addEventListener('change', (event) => {
      const checkbox = event.target.closest('.capture-input');
      if (!checkbox) return;
      setCaught(checkbox.dataset.type, checkbox.dataset.id, checkbox.checked);
      render();
    });

    dom.timelineResults.addEventListener('change', (event) => {
      const checkbox = event.target.closest('.capture-input');
      if (!checkbox) return;
      setCaught(checkbox.dataset.type, checkbox.dataset.id, checkbox.checked);
      render();
    });

    dom.resetButton.addEventListener('click', () => {
      if (!window.confirm('Réinitialiser toutes les captures sauvegardées ?')) return;
      Object.keys(CRITTERS).forEach((type) => CRITTERS[type].forEach((item) => removeStorage(caughtKey(type, item.id))));
      dom.searchInput.value = '';
      dom.missingOnly.checked = false;
      render();
    });

    initTimelineDates();
    render();
  </script>
